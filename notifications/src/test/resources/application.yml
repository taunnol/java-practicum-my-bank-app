spring:
  main:
    web-application-type: none
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: notifications-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.yandex.practicum.bank.common.dto"
        spring.json.use.type.headers: false
        spring.json.value.default.type: ru.yandex.practicum.bank.common.dto.NotificationEvent
    listener:
      ack-mode: manual_immediate

bank:
  kafka:
    topic:
      notifications: bank.notifications
