services:

  # --- Infrastructure ---

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: bank-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      POSTGRES_DB: ${POSTGRES_DB:-bank}
    ports:
      - "5432:5432"
    volumes:
      - bank_postgres_data:/var/lib/postgresql/data
    networks:
      - bank-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bank}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:${CONSUL_VERSION:-1.17}
    container_name: bank-consul
    command: "agent -dev -client=0.0.0.0"
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    networks:
      - bank-net
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: bank-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - bank-net

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-25.0.6}
    container_name: bank-keycloak
    depends_on:
      - keycloak-db
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - bank-net
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'" ]
      interval: 10s
      timeout: 5s
      retries: 12

  # --- Application Services ---

  gateway:
    build: ./gateway
    container_name: bank-gateway
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8081
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8081:8081"
    networks:
      - bank-net

  accounts:
    build: ./accounts
    container_name: bank-accounts
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bank}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8082:8082"
    networks:
      - bank-net

  cash:
    build: ./cash
    container_name: bank-cash
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8083
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8083:8083"
    networks:
      - bank-net

  transfer:
    build: ./transfer
    container_name: bank-transfer
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8084
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8084:8084"
    networks:
      - bank-net

  notifications:
    build: ./notifications
    container_name: bank-notifications
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8085
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8085:8085"
    networks:
      - bank-net

  front-ui:
    build: ./front-ui
    container_name: bank-front-ui
    depends_on:
      consul:
        condition: service_healthy
      gateway:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      CONSUL_HOST: consul
      SERVER_PORT: 8080
      BANK_GATEWAY_BASE_URL: http://gateway:8081
      BANK_SECURITY_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - bank-net

volumes:
  bank_postgres_data:
  keycloak_postgres_data:

networks:
  bank-net:
    driver: bridge
