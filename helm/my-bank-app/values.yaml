global:
  namespace: default
  imagePullPolicy: IfNotPresent

  postgres:
    host: postgres
    port: 5432

  keycloak:
    host: keycloak
    httpPort: 8080
    realmName: bank
    externalPort: 30088
    issuerUri: http://localhost:30088/realms/bank
    jwkSetUri: http://keycloak:8080/realms/bank/protocol/openid-connect/certs
    tokenUri: http://keycloak:8080/realms/bank/protocol/openid-connect/token

  kafka:
    bootstrapServers: kafka:9092

  services:
    accounts:
      host: accounts
      port: 80
    cash:
      host: cash
      port: 8083
    transfer:
      host: transfer
      port: 8084
    notifications:
      host: notifications
      port: 80
    gateway:
      host: gateway
      port: 8081
    frontUi:
      host: front-ui
      port: 8080

postgres:
  enabled: true

keycloak:
  enabled: true

kafka:
  enabled: true

accounts:
  enabled: true

cash:
  enabled: true

transfer:
  enabled: true

notifications:
  enabled: true

gateway:
  enabled: true

front-ui:
  enabled: true
