global:
  namespace: default
  imagePullPolicy: IfNotPresent

  postgres:
    host: postgres
    port: 5432

  keycloak:
    host: keycloak
    httpPort: 8080
    realmName: bank
    issuerUri: http://keycloak:8080/realms/bank
    externalPort: 30088

  services:
    accounts:
      host: accounts
      port: 8082
    cash:
      host: cash
      port: 8083
    transfer:
      host: transfer
      port: 8084
    notifications:
      host: notifications
      port: 8085
    gateway:
      host: gateway
      port: 8081
    frontUi:
      host: front-ui
      port: 8080

postgres:
  enabled: true

keycloak:
  enabled: true

accounts:
  enabled: true

cash:
  enabled: true

transfer:
  enabled: true

notifications:
  enabled: true

gateway:
  enabled: true

front-ui:
  enabled: true
