apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-accounts-test
  labels:
    app: accounts
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: accounts-test
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - wget -qO- --timeout=5 http://accounts:{{ .Values.service.port }}/actuator/health | grep -q '"status"'
  restartPolicy: Never
