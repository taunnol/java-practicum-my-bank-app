apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-keycloak-test
  labels:
    app: keycloak
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: keycloak-test
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -qO- --timeout=5 http://keycloak:{{ .Values.service.port }}/health/ready | grep -q '"status":"UP"'
  restartPolicy: Never
