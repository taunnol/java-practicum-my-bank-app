apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-cash-test
  labels:
    app: cash
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: cash-test
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - wget -qO- --timeout=5 http://cash:{{ .Values.service.port }}/actuator/health | grep -q '"status"'
  restartPolicy: Never
