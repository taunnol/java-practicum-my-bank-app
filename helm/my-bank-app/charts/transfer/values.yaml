replicaCount: 1

image:
  repository: my-bank-app/transfer
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084

security:
  enabled: true
  oauth2:
    clientId: transfer-service
    clientSecret: transfer-service-secret

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
