apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: plaintext
    - port: {{ .Values.service.controllerPort }}
      targetPort: {{ .Values.service.controllerPort }}
      protocol: TCP
      name: controller
  selector:
    app: kafka
    release: {{ .Release.Name }}
