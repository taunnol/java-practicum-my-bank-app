replicaCount: 1

image:
  repository: apache/kafka
  tag: "3.9.0"
  pullPolicy: IfNotPresent

service:
  port: 9092
  controllerPort: 9093

topic:
  name: bank.notifications
  partitions: 3
  replicationFactor: 1
  retentionMs: "-1"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
