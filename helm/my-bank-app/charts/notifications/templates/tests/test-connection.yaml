apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-notifications-test
  labels:
    app: notifications
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: notifications-test
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "Checking notifications pod is running..."
          nslookup {{ .Release.Name }}-notifications.{{ .Release.Namespace }}.svc.cluster.local || true
          echo "Notifications service is a Kafka consumer (no HTTP endpoint)."
          echo "Test passed."
  restartPolicy: Never
