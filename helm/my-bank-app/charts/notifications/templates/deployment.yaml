apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-notifications
  labels:
    app: notifications
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: notifications
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: notifications
        release: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "Kafka not available, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is available."
      containers:
        - name: notifications
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-notifications-config
          volumeMounts:
            - name: app-config
              mountPath: /app/config
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f app.jar
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f app.jar
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: app-config
          configMap:
            name: {{ .Release.Name }}-notifications-config
            items:
              - key: application.yml
                path: application.yml
