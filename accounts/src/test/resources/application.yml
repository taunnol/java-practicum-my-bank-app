spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  flyway:
    enabled: false
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

bank:
  security:
    enabled: false
  kafka:
    topic:
      notifications: bank.notifications
